name: SwiftChat CI pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install Dependencies
      working-directory: ./backend
      run: npm install
    - name: Run Backend Tests
      working-directory: ./backend
      run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install Dependencies
      working-directory: ./frontend
      run: npm install
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

  ai-services-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      working-directory: ./ai-services
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    - name: Lint with Ruff
      working-directory: ./ai-services
      run: ruff check .

  docker-build:
    needs: [backend-test, frontend-build, ai-services-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Validate docker-compose syntax
      run: docker-compose config
    - name: Build Docker Images
      run: docker-compose build
